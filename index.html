<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามรายจ่าย AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="dashboard-layout">
        
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="ph-fill ph-wallet"></i></div>
                <div class="logo-text">AI Expense</div>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" id="nav-dashboard">
                    <i class="ph ph-squares-four" style="font-size: 1.4rem;"></i>
                    แดชบอร์ด
                </a>
                <a href="#" class="nav-item" id="nav-transactions">
                    <i class="ph ph-receipt" style="font-size: 1.4rem;"></i>
                    รายการธุรกรรม
                </a>
                <a href="#" class="nav-item" id="nav-reports">
                    <i class="ph ph-chart-pie-slice" style="font-size: 1.4rem;"></i>
                    รายงานสรุป
                </a>
            </nav>
        </aside>

        <main class="main-content">
            
            <header>
                <h1 class="page-title" id="main-title">ภาพรวมการใช้จ่าย</h1>
            </header>

            <div id="view-dashboard" class="dashboard-grid">
                
                <div class="glass-card balance-card">
                    <div class="balance-label">ยอดใช้จ่ายรวมเดือนนี้</div>
                    <div class="balance-amount">12,500 <span style="font-size: 1.5rem; color: var(--text-muted);">THB</span></div>
                    <div class="balance-trend">
                        <i class="ph-fill ph-trend-down"></i>
                        ลดลง 15% จากเดือนที่แล้ว
                    </div>
                </div>

                <div class="glass-card ai-card">
                    <div class="section-title">
                        <span>บันทึกรายจ่ายด่วนด้วย AI</span>
                        <i class="ph-fill ph-magic-wand" style="color: var(--accent-purple);"></i>
                    </div>
                    <form id="ai-form" class="ai-form">
                        <div class="ai-input-wrapper">
                            <input type="text" id="expense-input" class="ai-input" placeholder="เช่น ค่าทางด่วนไปทำงาน 50 บาท" autocomplete="off" required>
                            <button type="submit" id="submit-btn" class="submit-btn">
                                <span id="btn-text">บันทึกข้อมูล</span>
                                <i class="ph-fill ph-sparkle"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="glass-card chart-card">
                    <div class="section-title">สัดส่วนรายจ่าย</div>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>

                <div class="glass-card transactions-card">
                    <div class="section-title">
                        <span>รายการล่าสุด</span>
                        <a href="#" style="font-size: 0.9rem; color: var(--accent-cyan); text-decoration: none;" id="link-view-all">ดูทั้งหมด</a>
                    </div>
                    <div class="transaction-list">
                        </div>
                </div>

            </div>

            <div id="view-transactions" style="display: none;">
                <div class="filter-bar">
                    <input type="text" class="filter-input" placeholder="ค้นหารายการ, หมวดหมู่...">
                    <select class="filter-select">
                        <option value="all">ทุกหมวดหมู่</option>option>
                        <option value="transport">การเดินทาง</option>
                        <option value="utility">สาธารณูปโภค</option>
                        <option value="entertainment">บันเทิง</option>
                        <option value="health">รักษา</option>
                        <option value="shopping">ช็อปปิ้ง</option>
                    </select>
                    <select class="filter-select">
                        <option value="month">เดือนนี้</option>
                        <option value="last-month">เดือนที่แล้ว</option>
                        <option value="year">ปีนี้</option>
                    </select>
                </div>

                <div class="full-transaction-list">
                    </div>
            </div>

            <div id="view-reports" class="dashboard-grid" style="display: none;">
                <div class="filter-bar" style="grid-column: span 12; margin-bottom: 0;">
                    <select class="filter-select">
                        <option value="2026">ปี 2026</option>
                        <option value="2025">ปี 2025</option>
                    </select>
                </div>

                <div class="glass-card report-full">
                    <div class="section-title">สรุปยอดใช้จ่ายรายเดือน</div>
                    <div class="chart-container" style="height: 350px;">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>

                <div class="glass-card report-half">
                    <div class="section-title">หมวดหมู่ที่ใช้จ่ายสูงสุด (ปีนี้)</div>
                    <div class="transaction-list">
                        </div>
                </div>

                <div class="glass-card report-half">
                    <div class="section-title">สถิติภาพรวม</div>
                    <div style="display: flex; flex-direction: column; gap: 24px; padding-top: 10px;">
                        </div>
                </div>
            </div>

        </main>
    </div>

    <div id="toast">
        <i class="ph-fill ph-sparkle" style="color: var(--accent-cyan); font-size: 1.4rem;"></i>
        <span id="toast-msg">✨ AI บันทึกรายจ่ายของคุณแล้ว!</span>
    </div>

    <script src="main.js"></script>
</body>
</html>
